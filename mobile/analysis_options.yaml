# Strict analyzer + lint configuration for the devx mobile companion.
# Baseline: flutter_lints. Strict language modes catch implicit-dynamic and
# inference gaps at analyze time instead of runtime.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_slow_async_io
    - cancel_subscriptions
    - directives_ordering
    - omit_local_variable_types
    - prefer_final_locals
    - prefer_single_quotes
    - require_trailing_commas
    - sort_pub_dependencies
    - test_types_in_equals
    - throw_in_finally
    - unawaited_futures
    - unnecessary_await_in_return
    - unnecessary_statements
    - use_super_parameters
