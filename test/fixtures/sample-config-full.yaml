# sample-config-full.yaml — exercises every section of the schema.
#
# Used by:
#   - cfg201's schema-validation smoke test (test/schema-smoke.mjs)
#   - cfg202's round-trip tests (load → setLeaf → toString → diff)
#   - cfg203's load-time validator tests
#
# Comments + key ordering + blank-line spacing must round-trip identically
# through eemeli/yaml.parseDocument — DO NOT reformat by hand without
# updating the round-trip baseline in cfg202.

# ---------------------------------------------------------------------------
# 1. Risk & process
# ---------------------------------------------------------------------------

mode: BETA
project:
  shape: bootstrapped-rewriting
thoroughness: balanced

# ---------------------------------------------------------------------------
# 2. Capacity & cost
# ---------------------------------------------------------------------------

capacity:
  max_concurrent: 3
  usage_cap_pct: 95
  usage_hard_stop_pct: 100
  daily_spend_cap_usd: 25.0
  daily_spend_hard_cap_usd: 100.0
  token_budget_per_spec: 500000
  model_strategy: balanced
  models:
    manager: claude-haiku-4-5
    concierge: claude-haiku-4-5
    plan: claude-opus-4-7
    dev: claude-sonnet-4-6
    test: claude-sonnet-4-6
    debug: claude-sonnet-4-6
    focus: claude-opus-4-7
    learn: claude-opus-4-7

# ---------------------------------------------------------------------------
# 3. Permissions
# ---------------------------------------------------------------------------

permissions:
  bash:
    allow:
      - git
      - gh
      - npm
      - pytest
    ask:
      - terraform
      - docker
    deny:
      - "rm -rf /"
      - "sudo *"
  network:
    allow_hosts:
      - github.com
      - api.anthropic.com
      - registry.npmjs.org
  file_writes:
    allow: ["**/*"]
    deny:
      - ".env"
      - ".env.*"
      - "secrets/**"
      - "id_rsa*"

# ---------------------------------------------------------------------------
# 4. Git strategy
# ---------------------------------------------------------------------------

git:
  default_branch: main
  integration_branch: develop
  branch_prefix: develop/
  pr_strategy: pr-to-develop
  merge_method: squash
  protect_main: true
  require_linear_history: true
  allow_force_push_main: false
  allow_force_push_develop: true
  delete_branch_on_merge: true

# ---------------------------------------------------------------------------
# 5. Promotion & autonomy
# ---------------------------------------------------------------------------

promotion:
  gate: balanced
  soak_hours: 24
  required_checks:
    - ci
    - coverage
    - qa-layer-2
  block_on_new_debug_items: true
  autonomy:
    initial_n: 3
    count: 0
    rollback_penalty: 0.5
    hotfix_zeroes: true
    veto_window_hours: 24
  agent: PromotionAgent

# ---------------------------------------------------------------------------
# 6. Coverage
# ---------------------------------------------------------------------------

coverage:
  enabled: true
  target: touched-lines
  threshold: 1.00
  blocking: true
  opt_out_marker: "devx:no-coverage"
  flaky_window_hours: 24
  flaky_action: file-test-md-entry
  language_runners:
    python: pytest --cov
    typescript: vitest --coverage
    rust: cargo llvm-cov
    go: go test -cover

# ---------------------------------------------------------------------------
# 7. CI
# ---------------------------------------------------------------------------

ci:
  provider: github-actions
  workflow_path: .github/workflows/devx-ci.yml
  required_checks:
    - lint
    - test
    - coverage
  retry_on_flake: true
  max_retries: 2
  poll_interval_s: 30
  poll_timeout_min: 45

# ---------------------------------------------------------------------------
# 8. QA & focus group
# ---------------------------------------------------------------------------

qa:
  browser_harness: playwright
  layer_2_cadence: nightly
  layer_2_personas: 4
  scripted_test_runner: playwright

focus_group:
  panel_size: 5
  consult_at:
    - plan
    - pre-promotion
  auto_evolve: true
  binding: false

# ---------------------------------------------------------------------------
# 9. Self-healing
# ---------------------------------------------------------------------------

self_healing:
  enabled: true
  retro_concordance_threshold: 3
  auto_apply:
    confidence_min: 0.85
    blast_radius_max: low
  canary_runs: 3
  user_review_required_for:
    - skills
    - prompts
    - agents
  user_review_optional_for:
    - memory
    - claude-md
    - config
  over_tuning_detector: true
  weekly_window_days: 7

# ---------------------------------------------------------------------------
# 10. Notifications
# ---------------------------------------------------------------------------

notifications:
  channels:
    - kind: fcm
      topic: devx-leonid
    - kind: webhook
      url: https://hooks.slack.com/services/T000/B000/XXXX
      template: slack
    - kind: email
      to: leonid@example.com
      digest_only: true
  events:
    context_rot_detected: silent
    manual_filed: push
    interview_filed: push
    ci_failed: push
    pr_opened: silent
    pr_merged: digest
    promotion_ready: push
    heartbeat_stale: push
    usage_cap_hit: push
    daily_spend_cap_hit: push
    agent_crashed_repeatedly: push
  quiet_hours: "22:00-08:00"
  quiet_hours_override:
    - usage_cap_hit
    - daily_spend_cap_hit
  digest_schedule: "daily-09:00"

# ---------------------------------------------------------------------------
# 11. UI
# ---------------------------------------------------------------------------

ui:
  tui:
    enabled: true
    layout: three-pane
    theme: dark
    sidebar_density: comfortable
    keybinds: vim
    refresh_ms: 500
    show_token_usage: true
    show_phase_timing: true
    sidebar_groups:
      - workers
      - system
      - inboxes
  web:
    enabled: true
    port: 7321
    bind: 127.0.0.1
    theme: dark
    show_diff: true
    show_pr_preview: true
    enable_drag_reorder: true
  mobile:
    enabled: true
    activity_feed_depth: 50
    show_phase_changes: true
    show_token_usage: true
    swipe_to_kill: true

# ---------------------------------------------------------------------------
# 12. Manager & Concierge
# ---------------------------------------------------------------------------

manager:
  heartbeat_interval_s: 60
  restart_on_token_pct: 0.85
  max_worker_age_min: 90
  worker_crash_backoff_s: [10, 30, 90, 300]
  max_restarts_per_spec: 5
  cloud_watchdog: true
  cloud_watchdog_cadence: "*/30 * * * *"
  cloud_spillover:
    enabled: false
    target: github-actions
  os_supervisor: auto
  log_dir: ~/Library/Logs/devx

concierge:
  always_on: true
  context_window_target: 0.40
  digest_interval_min: 60
  status_endpoint:
    bind: 127.0.0.1
    port: 7322
  intent_routing:
    feature_request: DEV.md
    bug_report: DEBUG.md
    question: INTERVIEW.md
    feedback: FOCUS.md

# ---------------------------------------------------------------------------
# 13. Storage
# ---------------------------------------------------------------------------

storage:
  worktree_root: .worktrees
  cache_dir: .devx-cache
  log_retention_days: 14
  spec_archive_after_days: 90
  archive_path: archive/
  gitignore_managed: true

# ---------------------------------------------------------------------------
# 14. Observability
# ---------------------------------------------------------------------------

observability:
  log_level: info
  redact:
    - api_keys
    - emails
    - tokens
    - aws_access_keys
  telemetry:
    enabled: false
    endpoint: null
    anonymized: true

# ---------------------------------------------------------------------------
# 15. BMAD integration
# ---------------------------------------------------------------------------

bmad:
  modules: [core, bmm, tea]
  output_root: _bmad-output
  preserve_on_eject: true
  workflows_path: _bmad/

# ---------------------------------------------------------------------------
# Stack — monorepo shape (mutually exclusive with single `stack:` block).
# ---------------------------------------------------------------------------

projects:
  - name: cli
    path: .
    layers: [backend]
    lint: eslint .
    test: vitest run
    coverage: vitest run --coverage
    pre_push: null
  - name: mobile
    path: mobile
    layers: [frontend]
    lint: flutter analyze
    test: flutter test
    coverage: flutter test --coverage
